name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WEBAPP_NAME: ark-story-studio
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            src/frontend/package-lock.json
            src/backend/package-lock.json

      - name: Build frontend
        working-directory: src/frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist into backend/public
        run: |
          rm -rf src/backend/public
          cp -r src/frontend/dist src/backend/public

      - name: Install backend production deps
        working-directory: src/backend
        run: npm ci --omit=dev

      - name: Zip deployment package
        working-directory: src/backend
        run: |
          zip -r ../../deploy.zip . \
            -x "*.env" "*.env.*" "data/*" "tsconfig.json"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
